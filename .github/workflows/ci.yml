name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  carbonsense-api:
    name: API (lint-free build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --prefix carbonsense-api
      - name: Build
        run: npm run build --prefix carbonsense-api
      - name: Test
        run: npm test --prefix carbonsense-api

  carbonsense-web:
    name: Web (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --prefix carbonsense-web
      - name: Build
        run: npm run build --prefix carbonsense-web
